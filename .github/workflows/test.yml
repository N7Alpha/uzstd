name: test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  produce:
    name: produce-${{ matrix.id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64-gcc
            os: ubuntu-24.04
            cc: gcc
            cflags: -std=c99 -O2 -Wall -Wextra -pedantic
          - id: linux-x64-clang
            os: ubuntu-24.04
            cc: clang
            cflags: -std=c99 -O2 -Wall -Wextra -pedantic
          - id: linux-arm64-gcc
            os: ubuntu-24.04-arm
            cc: gcc
            cflags: -std=c99 -O2 -Wall -Wextra -pedantic
          - id: macos-arm64-clang
            os: macos-14
            cc: clang
            cflags: -std=c99 -O2 -Wall -Wextra -pedantic
          - id: windows-x64-msvc
            os: windows-2022
            cc: cl
            cflags: /nologo /TC /O2 /W4
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install zstd on Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zstd
      - name: Install zstd on macOS
        if: runner.os == 'macOS'
        run: brew install zstd
      - name: Install zstd on Windows
        if: runner.os == 'Windows'
        run: choco install zstandard -y
      - name: Build and test
        if: runner.os != 'Windows'
        shell: bash
        env:
          CC: ${{ matrix.cc }}
          CFLAGS: ${{ matrix.cflags }}
          ARTIFACT_DIR: artifacts/${{ matrix.id }}
        run: tools/ci_interop.sh
      - name: Build with MSVC
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          if errorlevel 1 exit /b %errorlevel%
          cl /nologo /TC /O2 /W4 uzstd.c /Fe:uzstd.exe
          if errorlevel 1 exit /b %errorlevel%
          if not exist uzstd.exe exit /b 1
      - name: Test with MSVC binary
        if: runner.os == 'Windows'
        shell: bash
        env:
          ARTIFACT_DIR: artifacts/${{ matrix.id }}
        run: |
          ls -l uzstd.exe
          export UZSTD_EXE=./uzstd.exe
          export ZSTD_EXE=/c/ProgramData/chocolatey/bin/zstd.exe
          export SKIP_BUILD=1
          export PYTHON=python
          "$ZSTD_EXE" --version
          tools/ci_interop.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.id }}
          path: artifacts/${{ matrix.id }}

  fuzz:
    name: fuzz-${{ matrix.id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64
            os: ubuntu-24.04
          - id: macos-arm64
            os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build fuzzer with ASan + UBSan
        run: |
          clang -std=c99 -O1 -g -fno-omit-frame-pointer \
            -fsanitize=address,undefined -fno-sanitize-recover=all \
            -Wall -Wextra -pedantic \
            tools/fuzz_forever.c -o uzstd_fuzz
      - name: Fuzz (~90s; 15000 iterations under sanitizers)
        env:
          UZSTD_FUZZ_MAX_ITERS: "15000"
          UZSTD_FUZZ_MAX_CRASHES: "1"
          UZSTD_FUZZ_DIR: fuzz_artifacts
        run: ./uzstd_fuzz
      - name: Upload crash artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.id }}
          path: fuzz_artifacts

  produce-s390x:
    name: produce-linux-s390x-gcc
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: uraimo/run-on-arch-action@v3
        with:
          arch: s390x
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          install: |
            apt-get update -q -y
            apt-get install -q -y gcc zstd python3 ca-certificates
          run: |
            python3 - <<'PY'
            import sys
            assert sys.byteorder == 'big', sys.byteorder
            print('byteorder=big')
            PY
            CC=gcc CFLAGS="-std=c99 -O2 -Wall -Wextra -pedantic" ARTIFACT_DIR=artifacts/linux-s390x-gcc tools/ci_interop.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux-s390x-gcc
          path: artifacts/linux-s390x-gcc

  nds-rom:
    name: nds-rom-libretro
    runs-on: ubuntu-24.04
    container: devkitpro/devkitarm:latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify container tools
        run: |
          cc --version
          cmake --version
          git --version
          ninja --version
          python3 --version
          /opt/devkitpro/devkitARM/bin/arm-none-eabi-gcc --version
          /opt/devkitpro/tools/bin/ndstool '-?'
      - name: Build melonDS DS libretro core without Qt
        run: |
          git clone --depth 1 https://github.com/JesseTG/melonds-ds.git .bench/melonds-ds-src
          cmake -S .bench/melonds-ds-src -B .bench/melonds-ds-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_OPENGL=OFF
          cmake --build .bench/melonds-ds-build
          mkdir -p .bench/melonds-ds-dist/cores
          cp "$(find .bench/melonds-ds-build -name melondsds_libretro.so -print -quit)" .bench/melonds-ds-dist/cores/
      - name: Build and run NDS ROM in libretro
        env:
          DEVKITPRO: /opt/devkitpro
          DEVKITARM: /opt/devkitpro/devkitARM
          LIBRETRO_CORE: ${{ github.workspace }}/.bench/melonds-ds-dist/cores/melondsds_libretro.so
        run: tools/ci_nds_rom.sh
      - uses: actions/upload-artifact@v4
        with:
          name: nds-rom-libretro
          path: |
            nds/uzstd_nds_bench.nds
            nds/build/arm9.elf
            nds/build/arm7.elf
            bench/nds_emulator_results.json

  consume:
    name: consume-${{ matrix.id }}
    needs: [produce, produce-s390x]
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64-gcc
            os: ubuntu-24.04
            cc: gcc
            cflags: -std=c99 -O2 -Wall -Wextra -pedantic
          - id: linux-x64-clang
            os: ubuntu-24.04
            cc: clang
            cflags: -std=c99 -O2 -Wall -Wextra -pedantic
          - id: linux-arm64-gcc
            os: ubuntu-24.04-arm
            cc: gcc
            cflags: -std=c99 -O2 -Wall -Wextra -pedantic
          - id: macos-arm64-clang
            os: macos-14
            cc: clang
            cflags: -std=c99 -O2 -Wall -Wextra -pedantic
          - id: windows-x64-msvc
            os: windows-2022
            cc: cl
            cflags: /nologo /TC /O2 /W4
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: downloaded
      - name: Verify mesh artifacts
        if: runner.os != 'Windows'
        shell: bash
        env:
          CC: ${{ matrix.cc }}
          CFLAGS: ${{ matrix.cflags }}
          DOWNLOAD_DIR: downloaded
        run: tools/verify_mesh.sh
      - name: Build mesh verifier with MSVC
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          if errorlevel 1 exit /b %errorlevel%
          cl /nologo /TC /O2 /W4 uzstd.c /Fe:uzstd_mesh.exe
          if errorlevel 1 exit /b %errorlevel%
          if not exist uzstd_mesh.exe exit /b 1
      - name: Verify mesh artifacts with MSVC binary
        if: runner.os == 'Windows'
        shell: bash
        env:
          DOWNLOAD_DIR: downloaded
        run: |
          ls -l uzstd_mesh.exe
          UZSTD_EXE=./uzstd_mesh.exe SKIP_BUILD=1 PYTHON=python tools/verify_mesh.sh

  consume-s390x:
    name: consume-linux-s390x-gcc
    needs: [produce, produce-s390x]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: downloaded
      - uses: uraimo/run-on-arch-action@v3
        with:
          arch: s390x
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          install: |
            apt-get update -q -y
            apt-get install -q -y gcc python3 ca-certificates
          run: |
            python3 - <<'PY'
            import sys
            assert sys.byteorder == 'big', sys.byteorder
            print('byteorder=big')
            PY
            CC=gcc CFLAGS="-std=c99 -O2 -Wall -Wextra -pedantic" DOWNLOAD_DIR=downloaded tools/verify_mesh.sh
